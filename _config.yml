# Build settings
# Commented out line below - no longer using default minima theme 
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CV_deprecated.md
  - draftPosts/

# Keep linked academic documents discoverable, but do not advertise figure PDFs
# as standalone search results.
defaults:
  - scope:
      path: "assets/blogPics/**/*.pdf"
    values:
      sitemap: false
  - scope:
      path: "assets/projectPics/**/*.pdf"
    values:
      sitemap: false

#FROM CV TEMPLATE
markdown:   kramdown
style:  davewhipp
